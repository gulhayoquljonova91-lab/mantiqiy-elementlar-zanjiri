<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Mantiqiy Elementlar Zanjiri Simulatori</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1020;
  color:white;
}

header{
  padding:16px;
  text-align:center;
  background:#111827;
  border-bottom:1px solid #334155;
  font-size:20px;
  font-weight:bold;
}

/* MAIN */
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* LEFT GUIDE */
.left{
  width:28%;
  background:#0f172a;
  padding:16px;
  border-right:1px solid #334155;
  overflow:auto;
}

.rule{
  background:#111827;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  border:1px solid #334155;
  font-size:13px;
}

/* RIGHT */
.right{
  width:72%;
  padding:16px;
  overflow:auto;
}

/* ROW */
.chain{
  display:flex;
  align-items:center;
  gap:12px;
  background:#111827;
  padding:14px;
  margin-bottom:14px;
  border-radius:14px;
  border:1px solid #334155;
}

/* GATE */
.gate{
  width:140px;
  text-align:center;
  background:#0f172a;
  padding:10px;
  border-radius:12px;
  border:1px solid #334155;
}

.gate svg{
  width:110px;
  height:65px;
}

.gate-title{
  font-size:12px;
  color:#38bdf8;
  font-weight:bold;
}

/* INPUT */
.input{
  width:90px;
  text-align:center;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  border:1px solid #334155;
}

/* LINE */
.line{
  flex:1;
  height:5px;
  background:#475569;
  border-radius:10px;
}

/* LAMP */
.lamp{
  width:55px;
  height:55px;
  border-radius:50%;
  background:#334155;
  transition:0.3s;
}

.lamp.on{
  background:yellow;
  box-shadow:0 0 25px yellow;
}

/* BUTTON */
button{
  margin-top:6px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#ef4444;
  color:white;
}

button.on{background:#22c55e}

</style>
</head>

<body>

<header>?? Mantiqiy Elementlar Zanjiri Simulatori</header>

<div class="container">

<!-- GUIDE -->
<div class="left">

<div class="rule"><b>AND</b> > 1,1 = 1</div>
<div class="rule"><b>OR</b> > kamida 1 = 1</div>
<div class="rule"><b>NOT</b> > teskariga o‘zgartiradi</div>
<div class="rule"><b>NAND</b> > AND teskarisi</div>
<div class="rule"><b>NOR</b> > OR teskarisi</div>
<div class="rule"><b>XOR</b> > faqat bittasi 1</div>
<div class="rule"><b>XNOR</b> > teng bo‘lsa 1</div>
<div class="rule"><b>BUFFER</b> > A = chiqish</div>

</div>

<!-- SIMULATOR -->
<div class="right">

<!-- AND -->
<div class="chain">

<div class="gate">
<svg viewBox="0 0 120 70">
<path d="M20 10 H55 A25 25 0 0 1 55 60 H20 Z"
stroke="#38bdf8" stroke-width="4" fill="none"/>
</svg>
<div class="gate-title">AND</div>
</div>

<div class="input">A<br><button onclick="andA(this)">NO</button></div>
<div class="input">B<br><button onclick="andB(this)">NO</button></div>

<div class="line"></div>
<div class="lamp" id="l1"></div>

</div>

<!-- OR -->
<div class="chain">

<div class="gate">
<svg viewBox="0 0 120 70">
<path d="M15 10 Q60 35 15 60 Q70 60 95 35 Q70 10 15 10"
stroke="#38bdf8" stroke-width="4" fill="none"/>
</svg>
<div class="gate-title">OR</div>
</div>

<div class="input">A<br><button onclick="orA(this)">NO</button></div>
<div class="input">B<br><button onclick="orB(this)">NO</button></div>

<div class="line"></div>
<div class="lamp" id="l2"></div>

</div>

<!-- NOT -->
<div class="chain">

<div class="gate">
<svg viewBox="0 0 120 70">
<path d="M20 10 L80 35 L20 60 Z"
stroke="#38bdf8" stroke-width="4" fill="none"/>
<circle cx="92" cy="35" r="6" stroke="#38bdf8" fill="none"/>
</svg>
<div class="gate-title">NOT</div>
</div>

<div class="input">A<br><button onclick="notA(this)">NO</button></div>

<div class="line"></div>
<div class="lamp" id="l3"></div>

</div>

<!-- NAND -->
<div class="chain">

<div class="gate">
<svg viewBox="0 0 120 70">
<path d="M20 10 H55 A25 25 0 0 1 55 60 H20 Z"
stroke="#38bdf8" stroke-width="4" fill="none"/>
<circle cx="95" cy="35" r="6" stroke="#38bdf8" fill="none"/>
</svg>
<div class="gate-title">NAND</div>
</div>

<div class="input">A<br><button onclick="nandA(this)">NO</button></div>
<div class="input">B<br><button onclick="nandB(this)">NO</button></div>

<div class="line"></div>
<div class="lamp" id="l4"></div>

</div>

<!-- NOR -->
<div class="chain">

<div class="gate">
<svg viewBox="0 0 120 70">
<path d="M15 10 Q60 35 15 60 Q70 60 95 35 Q70 10 15 10"
stroke="#38bdf8" stroke-width="4" fill="none"/>
<circle cx="95" cy="35" r="6" stroke="#38bdf8" fill="none"/>
</svg>
<div class="gate-title">NOR</div>
</div>

<div class="input">A<br><button onclick="norA(this)">NO</button></div>
<div class="input">B<br><button onclick="norB(this)">NO</button></div>

<div class="line"></div>
<div class="lamp" id="l5"></div>

</div>

<!-- XOR -->
<div class="chain">

<div class="gate">
<svg viewBox="0 0 120 70">
<path d="M25 10 Q60 35 25 60" stroke="#38bdf8" stroke-width="4" fill="none"/>
<path d="M15 10 Q60 35 15 60 Q70 60 95 35 Q70 10 15 10" stroke="#38bdf8" stroke-width="4" fill="none"/>
</svg>
<div class="gate-title">XOR</div>
</div>

<div class="input">A<br><button onclick="xorA(this)">NO</button></div>
<div class="input">B<br><button onclick="xorB(this)">NO</button></div>

<div class="line"></div>
<div class="lamp" id="l6"></div>

</div>

<!-- XNOR -->
<div class="chain">

<div class="gate">
<svg viewBox="0 0 120 70">
<path d="M25 10 Q60 35 25 60" stroke="#38bdf8" stroke-width="4" fill="none"/>
<path d="M15 10 Q60 35 15 60 Q70 60 95 35 Q70 10 15 10" stroke="#38bdf8" stroke-width="4" fill="none"/>
<circle cx="95" cy="35" r="6" stroke="#38bdf8" fill="none"/>
</svg>
<div class="gate-title">XNOR</div>
</div>

<div class="input">A<br><button onclick="xnorA(this)">NO</button></div>
<div class="input">B<br><button onclick="xnorB(this)">NO</button></div>

<div class="line"></div>
<div class="lamp" id="l7"></div>

</div>

<!-- BUFFER (O'ZGARMAYDI) -->
<div class="chain">

<div class="gate">
<svg viewBox="0 0 120 70">
<path d="M20 10 L80 35 L20 60 Z"
stroke="#38bdf8" stroke-width="4" fill="none"/>
</svg>
<div class="gate-title">BUFFER</div>
</div>

<div class="input">A<br><button onclick="bufA(this)">NO</button></div>

<div class="line"></div>
<div class="lamp" id="l8"></div>

</div>

</div>
</div>

<script>

/* AND */
let a1=0,b1=0;
function andA(b){a1=!a1;ui(b,a1);set("l1",a1&&b1)}
function andB(b){b1=!b1;ui(b,b1);set("l1",a1&&b1)}

/* OR */
let a2=0,b2=0;
function orA(b){a2=!a2;ui(b,a2);set("l2",a2||b2)}
function orB(b){b2=!b2;ui(b,b2);set("l2",a2||b2)}

/* NOT */
let a3=0;
function notA(b){a3=!a3;ui(b,a3);set("l3",!a3)}

/* NAND */
let a4=0,b4=0;
function nandA(b){a4=!a4;ui(b,a4);set("l4",!(a4&&b4))}
function nandB(b){b4=!b4;ui(b,b4);set("l4",!(a4&&b4))}

/* NOR */
let a5=0,b5=0;
function norA(b){a5=!a5;ui(b,a5);set("l5",!(a5||b5))}
function norB(b){b5=!b5;ui(b,b5);set("l5",!(a5||b5))}

/* XOR */
let a6=0,b6=0;
function xorA(b){a6=!a6;ui(b,a6);set("l6",(a6&&!b6)||(!a6&&b6))}
function xorB(b){b6=!b6;ui(b,b6);set("l6",(a6&&!b6)||(!a6&&b6))}

/* XNOR */
let a7=0,b7=0;
function xnorA(b){a7=!a7;ui(b,a7);set("l7",!((a7&&!b7)||(!a7&&b7)))}
function xnorB(b){b7=!b7;ui(b,b7);set("l7",!((a7&&!b7)||(!a7&&b7)))}

/* BUFFER */
let a8=0;
function bufA(b){a8=!a8;ui(b,a8);set("l8",a8)}

function ui(btn,val){
btn.innerText=val?"YES":"NO";
btn.classList.toggle("on",val);
}

function set(id,val){
document.getElementById(id).classList.toggle("on",val);
}

</script>

</body>
</html>
